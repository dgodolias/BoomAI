<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Puffy Font Preview</title>
<style>
@font-face {
    font-family: 'Luckiest Guy';
    src: url('boomai/gui/frontend/assets/fonts/LuckiestGuy.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
}

body {
    background: #1A0632;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    margin: 0;
    gap: 40px;
}

/* ── Puffy breathe animation ── */
@keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
}

@keyframes puffy-breathe {
    0%, 100% {
        transform: scale(1);
        text-shadow:
            0 2px 0 #7B2FB0,
            0 4px 0 #5A1890,
            0 6px 0 #3D0B68,
            0 8px 0 #2D0A4E,
            0 10px 20px rgba(0, 0, 0, 0.45);
    }
    50% {
        transform: scale(1.04);
        text-shadow:
            0 3px 0 #7B2FB0,
            0 6px 0 #5A1890,
            0 9px 0 #3D0B68,
            0 12px 0 #2D0A4E,
            0 15px 25px rgba(0, 0, 0, 0.5);
    }
}

/* ── Logo with shimmer + puffy ── */
.logo-puffy {
    font-family: 'Luckiest Guy', cursive;
    font-size: 72px;
    background: linear-gradient(90deg, #4A0E78, #FF77AB, #DE52CA, #4A0E78);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 3s linear infinite, puffy-breathe 2.5s ease-in-out infinite;
    -webkit-text-stroke: 2px rgba(74, 14, 120, 0.5);
    paint-order: stroke fill;
    letter-spacing: 3px;
}

/* ── Heading with puffy shadow ── */
.heading-puffy {
    font-family: 'Luckiest Guy', cursive;
    font-size: 28px;
    color: #D6AAEE;
    letter-spacing: 1.5px;
    text-shadow:
        0 1px 0 #6B1FA0,
        0 2px 0 #4A0E78,
        0 3px 0 #2D0A4E,
        0 4px 8px rgba(0, 0, 0, 0.35);
}

/* ── Label ── */
.label {
    font-family: 'Segoe UI', sans-serif;
    font-size: 12px;
    color: #8B6AAF;
    text-transform: uppercase;
    letter-spacing: 2px;
}
</style>
</head>
<body>

<div style="text-align:center;">
    <span class="label">Logo with shimmer + puffy breathe animation</span>
    <div class="logo-puffy">BOOM AI</div>
</div>

<div style="text-align:center;">
    <span class="label">Section headings with puffy depth</span>
    <div class="heading-puffy" style="margin-top:8px;">SCAN OPTIONS</div>
    <div class="heading-puffy" style="margin-top:12px;">DEEP MODE</div>
</div>

</body>
</html>
